name: Gamepad_Helper_Fixed_Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Recreate Project Files
        run: |
          rm -rf app settings.gradle build.gradle
          mkdir -p app/src/main/java/com/car/game/helper
          mkdir -p app/src/main/res/xml
          
          # 1. 设置文件
          echo "include ':app'" > settings.gradle
          
          # 2. 根目录 build.gradle (加入插件版本定义)
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:4.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 3. app 目录 build.gradle
          cat <<'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdk 30
              defaultConfig {
                  applicationId "com.car.game.helper"
                  minSdk 21
                  targetSdk 30
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.3.0' }
          EOF

          # 4. 清单文件
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.car.game.helper">
              <application android:label="手柄启动助手" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" />
                      </intent-filter>
                      <meta-data android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" android:resource="@xml/device_filter" />
                  </activity>
              </application>
          </manifest>
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><resources><usb-device /></resources>' > app/src/main/res/xml/device_filter.xml

          # 5. Java 代码
          cat <<'EOF' > app/src/main/java/com/car/game/helper/MainActivity.java
          package com.car.game.helper;
          import android.app.Activity;
          import android.content.*;
          import android.hardware.usb.*;
          import android.os.*;
          import android.widget.Toast;
          import java.util.HashMap;

          public class MainActivity extends Activity {
              private static final String ACTION_USB_PERMISSION = "com.car.game.helper.USB_PERMISSION";
              private UsbManager usbManager;
              private final BroadcastReceiver usbReceiver = new BroadcastReceiver() {
                  public void onReceive(Context c, Intent i) {
                      if (ACTION_USB_PERMISSION.equals(i.getAction())) {
                          if (i.getBooleanExtra(UsbManager.EXTRA_PERMISSION_GRANTED, false)) launchApp();
                      }
                  }
              };
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  usbManager = (UsbManager) getSystemService(USB_SERVICE);
                  registerReceiver(usbReceiver, new IntentFilter(ACTION_USB_PERMISSION));
                  search();
              }
              private void search() {
                  HashMap<String, UsbDevice> list = usbManager.getDeviceList();
                  if (list.isEmpty()) { Toast.makeText(this, "未检测到手柄，请插入", Toast.LENGTH_LONG).show(); }
                  for (UsbDevice d : list.values()) {
                      if (!usbManager.hasPermission(d)) {
                          int flags = Build.VERSION.SDK_INT >= 31 ? (PendingIntent.FLAG_MUTABLE | PendingIntent.FLAG_UPDATE_CURRENT) : PendingIntent.FLAG_UPDATE_CURRENT;
                          PendingIntent pi = PendingIntent.getBroadcast(this, 0, new Intent(ACTION_USB_PERMISSION), flags);
                          usbManager.requestPermission(d, pi);
                      } else { launchApp(); }
                      break;
                  }
              }
              private void launchApp() {
                  try {
                      Intent i = getPackageManager().getLaunchIntentForPackage("com.cocav.tiemu");
                      if (i != null) { startActivity(i); finish(); }
                  } catch (Exception e) {}
              }
              protected void onDestroy() { 
                  super.onDestroy(); 
                  try { unregisterReceiver(usbReceiver); } catch(Exception e) {}
              }
          }
          EOF

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5
          arguments: assembleDebug --no-daemon --no-build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gamepad-Helper-Final
          path: app/build/outputs/apk/debug/*.apk
