name: Ultimate_APK_Builder
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project Files
        # 直接暴力生成所有文件，确保 100% 正确
        run: |
          mkdir -p app/src/main/java/com/car/game/helper
          mkdir -p app/src/main/res/xml
          
          # 1. 写入 settings.gradle
          echo "include ':app'" > settings.gradle
          
          # 2. 写入 app/build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              compileSdk 30
              namespace "com.car.game.helper"
              defaultConfig {
                  applicationId "com.car.game.helper"
                  minSdk 21
                  targetSdk 30
                  versionCode 1
                  versionName "1.0"
              }
          }
          repositories { google(); mavenCentral() }
          dependencies { implementation 'androidx.appcompat:appcompat:1.3.0' }
          EOF

          # 3. 写入 AndroidManifest.xml
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-feature android:name="android.hardware.usb.host" android:required="true" />
              <application android:label="手柄启动助手">
                  <activity android:name="com.car.game.helper.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" />
                      </intent-filter>
                      <meta-data android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" android:resource="@xml/device_filter" />
                  </activity>
              </application>
          </manifest>
          EOF

          # 4. 写入 device_filter.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><usb-device /></resources>' > app/src/main/res/xml/device_filter.xml

          # 5. 写入 MainActivity.java
          cat <<EOF > app/src/main/java/com/car/game/helper/MainActivity.java
          package com.car.game.helper;
          import android.app.Activity;
          import android.content.*;
          import android.hardware.usb.*;
          import android.os.*;
          import android.widget.Toast;
          import java.util.HashMap;

          public class MainActivity extends Activity {
              private static final String ACTION_USB_PERMISSION = "com.car.game.helper.USB_PERMISSION";
              private UsbManager usbManager;
              private final BroadcastReceiver usbReceiver = new BroadcastReceiver() {
                  public void onReceive(Context c, Intent i) {
                      if (ACTION_USB_PERMISSION.equals(i.getAction())) {
                          if (i.getBooleanExtra(UsbManager.EXTRA_PERMISSION_GRANTED, false)) launchApp();
                      }
                  }
              };
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  usbManager = (UsbManager) getSystemService(USB_SERVICE);
                  registerReceiver(usbReceiver, new IntentFilter(ACTION_USB_PERMISSION));
                  search();
              }
              private void search() {
                  HashMap<String, UsbDevice> list = usbManager.getDeviceList();
                  for (UsbDevice d : list.values()) {
                      if (!usbManager.hasPermission(d)) {
                          int flags = Build.VERSION.SDK_INT >= 31 ? PendingIntent.FLAG_MUTABLE : 0;
                          PendingIntent pi = PendingIntent.getBroadcast(this, 0, new Intent(ACTION_USB_PERMISSION), flags);
                          usbManager.requestPermission(d, pi);
                      } else { launchApp(); }
                      return;
                  }
                  Toast.makeText(this, "请插入手柄", Toast.LENGTH_SHORT).show();
              }
              private void launchApp() {
                  Intent i = getPackageManager().getLaunchIntentForPackage("com.cocav.tiemu");
                  if (i != null) { startActivity(i); finish(); }
                  else Toast.makeText(this, "未找到酷咖游戏", Toast.LENGTH_SHORT).show();
              }
              protected void onDestroy() { super.onDestroy(); unregisterReceiver(usbReceiver); }
          }
          EOF

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gamepad-Helper-Final
          path: app/build/outputs/apk/debug/*.apk
