name: Gamepad_Helper_Final_Standard
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # 使用官方 Action 自动配置 SDK，避免手动路径错误
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project Files
        run: |
          rm -rf app settings.gradle build.gradle
          echo "include ':app'" > settings.gradle
          
          # 根 build.gradle：明确插件版本
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:4.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # App build.gradle
          mkdir -p app/src/main/java/com/car/game/helper
          cat <<'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 30
              defaultConfig {
                  applicationId "com.car.game.helper"
                  minSdkVersion 21
                  targetSdkVersion 30
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.1.0' }
          EOF

          # 清单文件
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.car.game.helper">
              <application android:label="GamepadHelper">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # Java 代码：最精简逻辑
          cat <<'EOF' > app/src/main/java/com/car/game/helper/MainActivity.java
          package com.car.game.helper;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;

          public class MainActivity extends Activity {
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  try {
                      Intent i = getPackageManager().getLaunchIntentForPackage("com.cocav.tiemu");
                      if (i != null) startActivity(i);
                  } finally { finish(); }
              }
          }
          EOF

      - name: Build with Gradle
        # 使用官方构建插件，强制禁用可能导致 400 错误的缓存
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 6.7.1
          arguments: assembleDebug --no-daemon --no-build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gamepad-Helper-Success
          path: app/build/outputs/apk/debug/*.apk
