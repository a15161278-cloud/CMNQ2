name: Gamepad_Helper_Offline_Build
on: [push, workflow_dispatch]

# 强制全局环境使用 Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 基础拉取（这个不走缓存服务，通常是安全的）
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 手动安装 Java 11（直接从 Ubuntu 源安装，不走 GitHub 插件）
      - name: Install Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jdk wget unzip
          echo "JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64" >> $GITHUB_ENV

      # 3. 手动下载 Gradle（直接从官网下载，不依赖 GitHub 缓存）
      - name: Setup Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-6.7.1-bin.zip
          unzip -q gradle-6.7.1-bin.zip
          echo "$(pwd)/gradle-6.7.1/bin" >> $GITHUB_PATH

      # 4. 强制重建项目结构
      - name: Create Files
        run: |
          rm -rf app settings.gradle build.gradle
          mkdir -p app/src/main/java/com/car/game/helper
          mkdir -p app/src/main/res/xml
          echo "include ':app'" > settings.gradle
          
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:4.1.3' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 30
              defaultConfig {
                  applicationId "com.car.game.helper"
                  minSdkVersion 21
                  targetSdkVersion 30
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.2.0' }
          EOF

          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.car.game.helper">
              <application android:label="手柄启动助手" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" />
                      </intent-filter>
                      <meta-data android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" android:resource="@xml/device_filter" />
                  </activity>
              </application>
          </manifest>
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><resources><usb-device /></resources>' > app/src/main/res/xml/device_filter.xml

          cat <<'EOF' > app/src/main/java/com/car/game/helper/MainActivity.java
          package com.car.game.helper;
          import android.app.Activity;
          import android.content.*;
          import android.hardware.usb.*;
          import android.os.*;
          import android.widget.Toast;
          import java.util.HashMap;

          public class MainActivity extends Activity {
              private static final String ACTION_USB_PERMISSION = "com.car.game.helper.USB_PERMISSION";
              private UsbManager usbManager;
              private final BroadcastReceiver usbReceiver = new BroadcastReceiver() {
                  public void onReceive(Context c, Intent i) {
                      if (ACTION_USB_PERMISSION.equals(i.getAction())) {
                          if (i.getBooleanExtra(UsbManager.EXTRA_PERMISSION_GRANTED, false)) launchApp();
                      }
                  }
              };
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  usbManager = (UsbManager) getSystemService(USB_SERVICE);
                  registerReceiver(usbReceiver, new IntentFilter(ACTION_USB_PERMISSION));
                  search();
              }
              private void search() {
                  HashMap<String, UsbDevice> list = usbManager.getDeviceList();
                  if (list.isEmpty()) { Toast.makeText(this, "未检测到手柄", Toast.LENGTH_LONG).show(); }
                  for (UsbDevice d : list.values()) {
                      if (!usbManager.hasPermission(d)) {
                          int flags = Build.VERSION.SDK_INT >= 31 ? (PendingIntent.FLAG_MUTABLE | PendingIntent.FLAG_UPDATE_CURRENT) : PendingIntent.FLAG_UPDATE_CURRENT;
                          PendingIntent pi = PendingIntent.getBroadcast(this, 0, new Intent(ACTION_USB_PERMISSION), flags);
                          usbManager.requestPermission(d, pi);
                      } else { launchApp(); }
                      break;
                  }
              }
              private void launchApp() {
                  try {
                      Intent i = getPackageManager().getLaunchIntentForPackage("com.cocav.tiemu");
                      if (i != null) { startActivity(i); finish(); }
                  } catch (Exception e) {}
              }
              protected void onDestroy() { 
                  super.onDestroy(); 
                  try { unregisterReceiver(usbReceiver); } catch(Exception e) {}
              }
          }
          EOF

      # 5. 纯命令编译，彻底禁用缓存读写
      - name: Build
        run: |
          gradle assembleDebug --no-daemon --no-build-cache

      # 6. 上传 APK（这一步通常走 Artifact 服务，如果这里也报 400，说明 GitHub 彻底挂了）
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Gamepad-Helper-Download
          path: app/build/outputs/apk/debug/*.apk
