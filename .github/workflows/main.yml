name: Build_Car_Helper_APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Auto Fix Structure
        # 强制纠正所有文件位置
        run: |
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/java/com/car/game/helper
          
          # 移动 build.gradle 到 app 目录
          find . -name "build.gradle" -not -path "./app/build.gradle" -exec mv {} app/build.gradle \;
          
          # 移动 manifest 和 res
          find . -name "AndroidManifest.xml" -exec mv {} app/src/main/AndroidManifest.xml \;
          find . -name "device_filter.xml" -exec mv {} app/src/main/res/xml/device_filter.xml \;
          
          # 强制刷新 settings.gradle
          echo "include ':app'" > settings.gradle

      - name: Build with Gradle
        # 使用项目根目录直接编译
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gamepad-Helper-APK
          path: "**/*.apk"
