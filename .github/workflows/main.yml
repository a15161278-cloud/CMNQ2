name: 权限修复检测版_V31
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 构建项目
        run: |
          rm -rf *
          mkdir -p app/src/main/java/com/car/game/helper
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/xml
          
          echo "include ':app'" > settings.gradle
          
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              compileSdk 33
              namespace "com.car.game.helper"
              defaultConfig {
                  applicationId "com.car.game.helper"
                  minSdk 21
                  targetSdk 33
                  versionCode 11
                  versionName "3.5"
              }
          }
          EOF

          # 1. 设备过滤器
          echo '<?xml version="1.0" encoding="utf-8"?><resources><usb-device /></resources>' > app/src/main/res/xml/usb_device_filter.xml

          # 2. 清单文件 (完全沿用 26 版成功配置)
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-feature android:name="android.hardware.usb.host" />
              <application android:label="手柄检测中心" android:theme="@android:style/Theme.DeviceDefault.NoActionBar.Fullscreen">
                  <activity android:name="com.car.game.helper.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" />
                      </intent-filter>
                      <meta-data android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" android:resource="@xml/usb_device_filter" />
                  </activity>
              </application>
          </manifest>
          EOF

          # 3. 布局文件
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#000000" android:gravity="center" android:orientation="vertical">
              <TextView android:id="@+id/msgText" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="请按动手柄按键"
                  android:textColor="#00FF00" android:textSize="24sp" />
          </LinearLayout>
          EOF

          # 4. Java 代码 (修正了可能的语法错误)
          cat <<'EOF' > app/src/main/java/com/car/game/helper/MainActivity.java
          package com.car.game.helper;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.KeyEvent;
          import android.widget.TextView;

          public class MainActivity extends Activity {
              private TextView msgText;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  msgText = findViewById(R.id.msgText);
              }
              @Override
              public boolean dispatchKeyEvent(KeyEvent event) {
                  if (event.getAction() == KeyEvent.ACTION_DOWN) {
                      msgText.setText("检测到键值: " + event.getKeyCode());
                      return true;
                  }
                  return super.dispatchKeyEvent(event);
              }
          }
          EOF

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5
          arguments: assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gamepad-Tester-V31
          path: app/build/outputs/apk/debug/*.apk

