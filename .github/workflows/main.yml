name: Build_Car_Helper_APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Fix Project Structure
        # 这个步骤会自动把你放错位置的 build.gradle 挪到正确的地方
        run: |
          mkdir -p app
          if [ -f app/src/main/build.gradle ]; then mv app/src/main/build.gradle app/build.gradle; fi
          echo "include ':app'" > settings.gradle

      - name: Build with Gradle
        # 使用云端内置的 Gradle 直接打包
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gamepad-Helper-Download
          path: app/build/outputs/apk/debug/*.apk
