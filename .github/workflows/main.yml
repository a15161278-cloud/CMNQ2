name: 手柄助手增强版
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装安卓开发工具
        uses: android-actions/setup-android@v3

      - name: 重新生成正式代码
        run: |
          rm -rf *
          mkdir -p app/src/main/java/com/car/game/helper
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # 1. 配置文件
          echo "include ':app'" > settings.gradle
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # 2. App 编译规则
          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              compileSdk 33
              namespace "com.car.game.helper"
              defaultConfig {
                  applicationId "com.car.game.helper"
                  minSdk 21
                  targetSdk 33
                  versionCode 2
                  versionName "1.1"
              }
          }
          EOF

          # 3. 简单的界面显示
          echo '<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:gravity="center" android:orientation="vertical"><TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="手柄辅助启动器已运行\n正在监听手柄连接..." android:textSize="18sp" android:gravity="center"/></LinearLayout>' > app/src/main/res/layout/activity_main.xml
          echo '<resources><string name="app_name">手柄助手</string></resources>' > app/src/main/res/values/strings.xml

          # 4. 安卓清单 (加上手柄监听权限)
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="手柄助手" android:allowBackup="true" android:icon="@android:drawable/ic_menu_directions">
                  <activity android:name="com.car.game.helper.MainActivity" android:exported="true" android:theme="@android:style/Theme.DeviceDefault.Light.NoActionBar">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. 核心 Java 代码
          cat <<'EOF' > app/src/main/java/com/car/game/helper/MainActivity.java
          package com.car.game.helper;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;
          import android.widget.Toast;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  // 尝试启动模拟器
                  launchTargetApp();
              }

              private void launchTargetApp() {
                  try {
                      Intent i = getPackageManager().getLaunchIntentForPackage("com.cocav.tiemu");
                      if (i != null) {
                          startActivity(i);
                          // 启动成功后，过 2 秒自动关闭本助手，防止干扰
                          getWindow().getDecorView().postDelayed(() -> finish(), 2000);
                      } else {
                          Toast.makeText(this, "找不到模拟器(com.cocav.tiemu)，请检查是否安装", Toast.LENGTH_LONG).show();
                      }
                  } catch (Exception e) {
                      Toast.makeText(this, "启动出错: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                  }
              }
          }
          EOF

      - name: 打包 APK
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5
          arguments: assembleDebug --no-daemon --no-build-cache

      - name: 导出
        uses: actions/upload-artifact@v4
        with:
          name: Gamepad-Helper-V1.1
          path: app/build/outputs/apk/debug/*.apk
