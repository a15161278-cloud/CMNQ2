name: Gamepad_Helper_Final_Push
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Force Install Android Build Tools
        # 直接通过 sdkmanager 强行安装 30.0.3，解决云端环境缺失导致的 Build 失败
        run: |
          echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --install "build-tools;30.0.3" "platforms;android-30"

      - name: Create Minimal Project
        run: |
          rm -rf app settings.gradle build.gradle
          echo "include ':app'" > settings.gradle
          
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:4.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          mkdir -p app/src/main/java/com/car/game/helper
          cat <<'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 30
              defaultConfig {
                  applicationId "com.car.game.helper"
                  minSdkVersion 21
                  targetSdkVersion 30
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.1.0' }
          EOF

          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.car.game.helper">
              <application android:label="GamepadHelper">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<'EOF' > app/src/main/java/com/car/game/helper/MainActivity.java
          package com.car.game.helper;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;

          public class MainActivity extends Activity {
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  try {
                      Intent i = getPackageManager().getLaunchIntentForPackage("com.cocav.tiemu");
                      if (i != null) startActivity(i);
                  } finally { finish(); }
              }
          }
          EOF

      - name: Final Build
        run: |
          # 使用自带的 gradlew 如果没有则手动执行。强制不使用缓存以避开 400 错误。
          chmod +x gradlew || true
          gradle assembleDebug --no-daemon --no-build-cache

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Gamepad-Helper-Final
          path: app/build/outputs/apk/debug/*.apk
