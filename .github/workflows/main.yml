name: 权限成功验证版_V29
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 构建项目
        run: |
          rm -rf *
          mkdir -p app/src/main/java/com/car/game/helper
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/xml
          
          echo "include ':app'" > settings.gradle
          
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              compileSdk 33
              namespace "com.car.game.helper"
              defaultConfig {
                  applicationId "com.car.game.helper"
                  minSdk 21
                  targetSdk 33
                  versionCode 9
                  versionName "3.3-SuccessBase"
              }
          }
          EOF

          # 1. 沿用之前成功的设备过滤配置
          cat <<'EOF' > app/src/main/res/xml/usb_device_filter.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <usb-device />
          </resources>
          EOF

          # 2. 沿用之前成功的清单配置
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-feature android:name="android.hardware.usb.host" />
              <application android:label="车载游戏助手" android:theme="@android:style/Theme.DeviceDefault.NoActionBar.Fullscreen">
                  <activity android:name="com.car.game.helper.MainActivity" android:exported="true" android:configChanges="orientation|screenSize|keyboard|navigation">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" />
                      </intent-filter>
                      <meta-data android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" android:resource="@xml/usb_device_filter" />
                  </activity>
              </application>
          </manifest>
          EOF

          # 3. 核心代码：不再跳转，改为直接抓取按键
          cat <<'EOF' > app/src/main/java/com/car/game/helper/MainActivity.java
          package com.car.game.helper;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.KeyEvent;
          import android.widget.TextView;
          import android.view.WindowManager;

          public class MainActivity extends Activity {
              private TextView status;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  setContentView(R.layout.activity_main);
                  status = findViewById(R.id.statusText);
              }

              // 捕获所有物理按键事件
              @Override
              public boolean dispatchKeyEvent(KeyEvent event) {
                  if (event.getAction() == KeyEvent.ACTION_DOWN) {
                      int code = event.getKeyCode();
                      String name = (event.getDevice() != null) ? event.getDevice().getName() : "通用设备";
                      status.setText("检测到输入！\n按键码: " + code + "\n设备名: " + name);
                      return true;
                  }
                  return super.dispatchKeyEvent(event);
              }
          }
          EOF

          # 4. 简单的显示界面
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#121212" android:gravity="center" android:orientation="vertical">
              <TextView android:id="@+id/statusText" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="权限已激活\n请按动手柄按键..."
                  android:textColor="#00FF00" android:textSize="26sp" android:gravity="center"/>
          </LinearLayout>
          EOF

      - name: Build
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5
          arguments: assembleDebug --no-daemon --no-build-cache

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Gamepad-Success-Test
          path: app/build/outputs/apk/debug/*.apk
          package com.car.game.helper;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.KeyEvent;
          import android.widget.TextView;
          import android.view.WindowManager;

          public class MainActivity extends Activity {
              private TextView keyText;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  // 保持屏幕常亮
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  setContentView(R.layout.activity_main);
                  keyText = findViewById(R.id.keyText);
              }

              // 捕获手柄按键 (A, B, X, Y, 方向键等)
              @Override
              public boolean dispatchKeyEvent(KeyEvent event) {
                  if (event.getAction() == KeyEvent.ACTION_DOWN) {
                      int keyCode = event.getKeyCode();
                      String deviceName = event.getDevice() != null ? event.getDevice().getName() : "未知设备";
                      keyText.setText("按键码: " + keyCode + "\n设备: " + deviceName);
                      return true; // 拦截事件，不传给系统
                  }
                  return super.dispatchKeyEvent(event);
              }
          }
          EOF

      - name: Build
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5
          arguments: assembleDebug --no-daemon --no-build-cache

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Car-Game-Engine-Test
          path: app/build/outputs/apk/debug/*.apk
