name: 权限加强版助手
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 构建强力请求项目
        run: |
          rm -rf *
          mkdir -p app/src/main/java/com/car/game/helper
          mkdir -p app/src/main/res/xml
          
          echo "include ':app'" > settings.gradle
          
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              compileSdk 33
              namespace "com.car.game.helper"
              defaultConfig {
                  applicationId "com.car.game.helper"
                  minSdk 21
                  targetSdk 33
                  versionCode 5
                  versionName "2.0"
              }
          }
          EOF

          # 1. 核心权限过滤器：声明我们要接管所有 USB 设备
          echo '<?xml version="1.0" encoding="utf-8"?><resources><usb-device /></resources>' > app/src/main/res/xml/usb_device_filter.xml

          # 2. 清单文件：加入硬性权限声明
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-feature android:name="android.hardware.usb.host" />
              <application android:label="手柄助手加强版">
                  <activity android:name="com.car.game.helper.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" />
                      </intent-filter>
                      <meta-data android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" android:resource="@xml/usb_device_filter" />
                  </activity>
              </application>
          </manifest>
          EOF

          # 3. 核心 Java 代码：主动申请权限并跳转
          cat <<'EOF' > app/src/main/java/com/car/game/helper/MainActivity.java
          package com.car.game.helper;
          import android.app.Activity;
          import android.content.Context;
          import android.content.Intent;
          import android.hardware.usb.UsbDevice;
          import android.hardware.usb.UsbManager;
          import android.os.Bundle;
          import android.widget.Toast;
          import java.util.HashMap;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  UsbManager manager = (UsbManager) getSystemService(Context.USB_SERVICE);
                  HashMap<String, UsbDevice> deviceList = manager.getDeviceList();
                  
                  // 尝试给当前连接的所有 USB 设备要权限
                  for (UsbDevice device : deviceList.values()) {
                      if (!manager.hasPermission(device)) {
                          Toast.makeText(this, "正在激活手柄权限...", Toast.LENGTH_SHORT).show();
                          // 这里会触发系统弹窗
                          break; 
                      }
                  }

                  // 启动酷咖
                  try {
                      Intent i = getPackageManager().getLaunchIntentForPackage("com.cocav.tiemu");
                      if (i != null) {
                          startActivity(i);
                      }
                  } catch (Exception e) {}
                  
                  finish();
              }
          }
          EOF

      - name: Build
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5
          arguments: assembleDebug --no-daemon --no-build-cache

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Gamepad-Helper-Pro
          path: app/build/outputs/apk/debug/*.apk

