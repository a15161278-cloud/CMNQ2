name: Gamepad_Helper_Final_Debug_Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Manual Java & SDK Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jdk wget unzip
          echo "JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64" >> $GITHUB_ENV
          echo "PATH=$PATH:/usr/lib/jvm/java-11-openjdk-amd64/bin" >> $GITHUB_ENV

      - name: Manual Gradle Download
        run: |
          wget -q https://services.gradle.org/distributions/gradle-6.7.1-bin.zip
          unzip -q gradle-6.7.1-bin.zip
          echo "$(pwd)/gradle-6.7.1/bin" >> $GITHUB_PATH

      - name: Recreate Absolute Project
        run: |
          rm -rf app settings.gradle build.gradle
          mkdir -p app/src/main/java/com/car/game/helper
          mkdir -p app/src/main/res/xml
          echo "include ':app'" > settings.gradle
          
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:4.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 30
              defaultConfig {
                  applicationId "com.car.game.helper"
                  minSdkVersion 21
                  targetSdkVersion 30
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.1.0' }
          EOF

          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.car.game.helper">
              <application android:label="GamepadHelper" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><resources><usb-device /></resources>' > app/src/main/res/xml/device_filter.xml

          cat <<'EOF' > app/src/main/java/com/car/game/helper/MainActivity.java
          package com.car.game.helper;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;
          import android.widget.Toast;

          public class MainActivity extends Activity {
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  try {
                      Intent i = getPackageManager().getLaunchIntentForPackage("com.cocav.tiemu");
                      if (i != null) { startActivity(i); finish(); }
                      else { Toast.makeText(this, "App Not Found", Toast.LENGTH_SHORT).show(); }
                  } catch (Exception e) { finish(); }
              }
          }
          EOF

      - name: Build with Debug Logs
        run: |
          # 这一步会输出非常详尽的错误信息
          gradle assembleDebug --no-daemon --no-build-cache --stacktrace --info

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Gamepad-Helper-Final
          path: app/build/outputs/apk/debug/*.apk
