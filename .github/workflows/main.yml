name: SteamLink_Final_V41
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project Files
        run: |
          rm -rf *
          mkdir -p app/src/main/java/com/valvesoftware/steamlink
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          
          echo "include ':app'" > settings.gradle
          
          printf "buildscript {\n    repositories { google(); mavenCentral() }\n    dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }\n}\nallprojects {\n    repositories { google(); mavenCentral() }\n}" > build.gradle

          printf "plugins { id 'com.android.application' }\nandroid {\n    compileSdk 33\n    namespace 'com.valvesoftware.steamlink'\n    defaultConfig {\n        applicationId 'com.valvesoftware.steamlink'\n        minSdk 21\n        targetSdk 33\n        versionCode 41\n        versionName '4.1'\n    }\n}" > app/build.gradle

          echo '<resources><string name="app_name">Steam Link</string></resources>' > app/src/main/res/values/strings.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><usb-device /></resources>' > app/src/main/res/xml/usb_device_filter.xml

          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-feature android:name="android.hardware.usb.host" android:required="false" />
              <application android:label="@string/app_name" android:theme="@android:style/Theme.DeviceDefault.NoActionBar.Fullscreen">
                  <activity android:name="com.valvesoftware.steamlink.MainActivity" android:exported="true" android:configChanges="orientation|screenSize|keyboard|navigation">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <meta-data android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" android:resource="@xml/usb_device_filter" />
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#000000" android:gravity="center" android:orientation="vertical">
              <TextView android:id="@+id/t1" android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="超级玛丽核心已就绪" android:textColor="#00FF00" android:textSize="25sp" />
              <TextView android:id="@+id/t2" android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="请按手柄 A 键开始" android:textColor="#FFFFFF" android:textSize="20sp" />
          </LinearLayout>
          EOF

          cat <<'EOF' > app/src/main/java/com/valvesoftware/steamlink/MainActivity.java
          package com.valvesoftware.steamlink;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.KeyEvent;
          import android.widget.TextView;
          import android.view.WindowManager;

          public class MainActivity extends Activity {
              private TextView t2;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  setContentView(R.layout.activity_main);
                  t2 = findViewById(R.id.t2);
              }
              @Override
              public boolean dispatchKeyEvent(KeyEvent event) {
                  if (event.getAction() == KeyEvent.ACTION_DOWN) {
                      int k = event.getKeyCode();
                      if(k == 96 || k == 23 || k == 66) t2.setText("动作: 跳跃 / 开始");
                      else if(k == 19) t2.setText("动作: 向上走");
                      else if(k == 20) t2.setText("动作: 向下走");
                      else if(k == 21) t2.setText("动作: 向左走");
                      else if(k == 22) t2.setText("动作: 向右走");
                      return true;
                  }
                  return super.dispatchKeyEvent(event);
              }
          }
          EOF

      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SteamLink_Gamer_V41
          path: app/build/outputs/apk/debug/*.apk
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  setContentView(R.layout.activity_main);
                  overlay = findViewById(R.id.overlay);
              }
              @Override
              public boolean dispatchKeyEvent(KeyEvent event) {
                  if (event.getAction() == KeyEvent.ACTION_DOWN) {
                      int keyCode = event.getKeyCode();
                      String action = "";
                      switch (keyCode) {
                          case 96: case 97: case 23: action = "【开始游戏】"; break;
                          case 19: action = "向上"; break;
                          case 20: action = "向下"; break;
                          case 21: action = "向左"; break;
                          case 22: action = "向右"; break;
                      }
                      if (!action.equals("")) {
                          overlay.setText("手柄已连接!\n动作: " + action);
                          return true;
                      }
                  }
                  return super.dispatchKeyEvent(event);
              }
          }
          EOF

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5
          arguments: assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SteamLink_Gamer_V40
          path: app/build/outputs/apk/debug/*.apk
          cat <<'EOF' > app/src/main/java/com/valvesoftware/steamlink/MainActivity.java
          package com.valvesoftware.steamlink;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.KeyEvent;
          import android.view.View;
          import android.widget.TextView;
          import android.view.WindowManager;

          public class MainActivity extends Activity {
              private TextView overlay;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  setContentView(R.layout.activity_main);
                  overlay = findViewById(R.id.overlay);
              }

              @Override
              public boolean dispatchKeyEvent(KeyEvent event) {
                  int action = event.getAction();
                  int keyCode = event.getKeyCode();
                  
                  if (action == KeyEvent.ACTION_DOWN) {
                      String cmd = "";
                      switch (keyCode) {
                          case 96: case KeyEvent.KEYCODE_BUTTON_A: cmd = "A (开始/跳跃)"; break;
                          case 97: case KeyEvent.KEYCODE_BUTTON_B: cmd = "B (攻击/返回)"; break;
                          case 99: case KeyEvent.KEYCODE_BUTTON_X: cmd = "X (辅助)"; break;
                          case 100: case KeyEvent.KEYCODE_BUTTON_Y: cmd = "Y (菜单)"; break;
                          case KeyEvent.KEYCODE_DPAD_UP: cmd = "↑ 上"; break;
                          case KeyEvent.KEYCODE_DPAD_DOWN: cmd = "↓ 下"; break;
                          case KeyEvent.KEYCODE_DPAD_LEFT: cmd = "← 左"; break;
                          case KeyEvent.KEYCODE_DPAD_RIGHT: cmd = "→ 右"; break;
                          case 108: case KeyEvent.KEYCODE_BUTTON_START: cmd = "START"; break;
                      }
                      
                      if (!cmd.equals("")) {
                          final String displayCmd = cmd;
                          runOnUiThread(() -> {
                              overlay.setText("手柄已连接，实时动作：\n" + displayCmd);
                          });
                          return true;
                      }
                  }
                  return super.dispatchKeyEvent(event);
              }
          }
          EOF

      - name: 执行 Gradle 编译
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5
          arguments: assembleDebug --no-daemon

      - name: 交付最终包
        uses: actions/upload-artifact@v4
        with:
          name: Steam-Link-Final-Verified
          path: app/build/outputs/apk/debug/*.apk
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.KeyEvent;
          import android.widget.TextView;
          import android.widget.Toast;

          public class MainActivity extends Activity {
              private TextView ctrlText;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  ctrlText = findViewById(R.id.ctrlText);
              }

              // 既然 Steam Link 界面有反应，说明 dispatchKeyEvent 一定能抓到信号
              @Override
              public boolean dispatchKeyEvent(KeyEvent event) {
                  if (event.getAction() == KeyEvent.ACTION_DOWN) {
                      int code = event.getKeyCode();
                      // XBox A键 通常是 96，B键是 97
                      if (code == KeyEvent.KEYCODE_BUTTON_A || code == 96) {
                          ctrlText.setText("【正在加载】坦克大战...");
                          return true;
                      }
                      if (code == KeyEvent.KEYCODE_BUTTON_B || code == 97) {
                          ctrlText.setText("【正在加载】超级玛丽...");
                          return true;
                      }
                  }
                  return super.dispatchKeyEvent(event);
              }
          }
          EOF

      - name: Build
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5
          arguments: assembleDebug --no-daemon
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Steam-Game-Final
          path: app/build/outputs/apk/debug/*.apk
