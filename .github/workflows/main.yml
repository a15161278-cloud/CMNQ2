name: 北通适配修正版_V34
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 构建北通适配项目
        run: |
          rm -rf *
          mkdir -p app/src/main/java/com/car/game/helper
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/xml
          
          echo "include ':app'" > settings.gradle
          
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              compileSdk 33
              namespace "com.car.game.helper"
              defaultConfig {
                  applicationId "com.car.game.helper"
                  minSdk 21
                  targetSdk 33
                  versionCode 14
                  versionName "5.1"
              }
          }
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><resources><usb-device /></resources>' > app/src/main/res/xml/usb_device_filter.xml

          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-feature android:name="android.hardware.usb.host" />
              <application android:label="北通游戏助手" android:theme="@android:style/Theme.DeviceDefault.NoActionBar.Fullscreen">
                  <activity android:name="com.car.game.helper.MainActivity" android:exported="true" android:configChanges="orientation|screenSize|keyboard|navigation">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <meta-data android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" android:resource="@xml/usb_device_filter" />
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#000000" android:gravity="center" android:orientation="vertical">
              <TextView android:id="@+id/msgText" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="北通手柄已识别"
                  android:textColor="#00FF00" android:textSize="20sp" />
              <TextView android:id="@+id/dataText" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:layout_marginTop="20dp"
                  android:text="等待按键或摇杆数据..." android:textColor="#00FFFF" android:textSize="24sp" />
          </LinearLayout>
          EOF

          cat <<'EOF' > app/src/main/java/com/car/game/helper/MainActivity.java
          package com.car.game.helper;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.InputDevice;
          import android.widget.TextView;

          public class MainActivity extends Activity {
              private TextView dataText;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  dataText = findViewById(R.id.dataText);
              }
              @Override
              public boolean dispatchKeyEvent(KeyEvent event) {
                  if (event.getAction() == KeyEvent.ACTION_DOWN) {
                      dataText.setText("检测到按键: " + event.getKeyCode());
                  }
                  return super.dispatchKeyEvent(event);
              }
              @Override
              public boolean onGenericMotionEvent(MotionEvent event) {
                  if ((event.getSource() & InputDevice.SOURCE_JOYSTICK) == InputDevice.SOURCE_JOYSTICK) {
                      float x = event.getAxisValue(MotionEvent.AXIS_X);
                      float y = event.getAxisValue(MotionEvent.AXIS_Y);
                      if (Math.abs(x) > 0.1 || Math.abs(y) > 0.1) {
                          dataText.setText("摇杆坐标: " + x + " / " + y);
                      }
                  }
                  return super.onGenericMotionEvent(event);
              }
          }
          EOF

      - name: Build
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5
          arguments: assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Gamepad-Beitong-V34
          path: app/build/outputs/apk/debug/*.apk
