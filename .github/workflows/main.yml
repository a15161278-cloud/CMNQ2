name: Gamepad_Helper_V20_Final
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 升级到 JDK 17，满足 SDK Manager 的硬性要求
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. 重新初始化 SDK，现在有了 JDK 17，这一步不会再报错了
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project Files
        run: |
          rm -rf app settings.gradle build.gradle
          echo "include ':app'" > settings.gradle
          
          # 根 build.gradle：升级到支持 JDK 17 的插件版本
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # App build.gradle：加入 namespace 规范
          mkdir -p app/src/main/java/com/car/game/helper
          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              compileSdk 33
              namespace "com.car.game.helper"
              defaultConfig {
                  applicationId "com.car.game.helper"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          # AndroidManifest.xml
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="GamepadHelper" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name="com.car.game.helper.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # MainActivity.java
          cat <<'EOF' > app/src/main/java/com/car/game/helper/MainActivity.java
          package com.car.game.helper;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;

          public class MainActivity extends Activity {
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  try {
                      Intent i = getPackageManager().getLaunchIntentForPackage("com.cocav.tiemu");
                      if (i != null) startActivity(i);
                  } catch (Exception e) {}
                  finish();
              }
          }
          EOF

      # 3. 使用适配 JDK 17 的 Gradle 7.5
      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5
          arguments: assembleDebug --no-daemon --no-build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gamepad-Helper-Final
          path: app/build/outputs/apk/debug/*.apk
