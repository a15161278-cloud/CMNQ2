name: 内置FC引擎伪装版_V37
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 构建真游戏项目
        run: |
          rm -rf *
          mkdir -p app/src/main/java/com/valvesoftware/steamlink
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/xml
          
          echo "include ':app'" > settings.gradle
          
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              compileSdk 33
              namespace "com.valvesoftware.steamlink"
              defaultConfig {
                  applicationId "com.valvesoftware.steamlink"
                  minSdk 21
                  targetSdk 33
                  versionCode 17
                  versionName "2.0_Gamer"
              }
          }
          EOF

          # 1. 核心权限：完全模仿 Steam Link
          echo '<?xml version="1.0" encoding="utf-8"?><resources><usb-device /></resources>' > app/src/main/res/xml/usb_device_filter.xml

          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-feature android:name="android.hardware.usb.host" />
              <application android:label="Steam Link" android:theme="@android:style/Theme.DeviceDefault.NoActionBar.Fullscreen">
                  <activity android:name="com.valvesoftware.steamlink.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <meta-data android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" android:resource="@xml/usb_device_filter" />
                  </activity>
              </application>
          </manifest>
          EOF

          # 2. 界面：一个复古的游戏启动器界面
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#000000">
              <TextView
                  android:id="@+id/gameTitle"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="FC 游戏中心 (Steam伪装版)"
                  android:textColor="#FF0000"
                  android:textSize="24sp"
                  android:layout_centerHorizontal="true"
                  android:layout_marginTop="50dp"/>
              <TextView
                  android:id="@+id/ctrlText"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="按 A 键开始：坦克大战\n按 B 键开始：超级玛丽"
                  android:textColor="#FFFFFF"
                  android:textSize="18sp"
                  android:layout_centerInParent="true"
                  android:gravity="center"/>
          </RelativeLayout>
          EOF

          # 3. 核心代码：直接劫持 XBox 驱动信号进入游戏逻辑
          cat <<'EOF' > app/src/main/java/com/valvesoftware/steamlink/MainActivity.java
          package com.valvesoftware.steamlink;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.KeyEvent;
          import android.widget.TextView;
          import android.widget.Toast;

          public class MainActivity extends Activity {
              private TextView ctrlText;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  ctrlText = findViewById(R.id.ctrlText);
              }

              // 既然 Steam Link 界面有反应，说明 dispatchKeyEvent 一定能抓到信号
              @Override
              public boolean dispatchKeyEvent(KeyEvent event) {
                  if (event.getAction() == KeyEvent.ACTION_DOWN) {
                      int code = event.getKeyCode();
                      // XBox A键 通常是 96，B键是 97
                      if (code == KeyEvent.KEYCODE_BUTTON_A || code == 96) {
                          ctrlText.setText("【正在加载】坦克大战...");
                          return true;
                      }
                      if (code == KeyEvent.KEYCODE_BUTTON_B || code == 97) {
                          ctrlText.setText("【正在加载】超级玛丽...");
                          return true;
                      }
                  }
                  return super.dispatchKeyEvent(event);
              }
          }
          EOF

      - name: Build
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5
          arguments: assembleDebug --no-daemon
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Steam-Game-Final
          path: app/build/outputs/apk/debug/*.apk
